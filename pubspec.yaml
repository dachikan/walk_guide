name: walk_guide
description: "視覚障害者のためのスマ歩道案内アプリ"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
version: 0.0.10+19

environment:
  sdk: ^3.11.0

# Dependencies specify other packages that your package needs in order to work.
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: 1.0.8       # 厳密固定
  flutter_dotenv: 5.1.0        # 厳密固定
  google_generative_ai: 0.4.0  # 厳密固定
  camera: 0.11.3+1             # 安定動作時の実バージョンに固定
  flutter_tts: 4.2.2           # 厳密固定
  speech_to_text: 7.3.0        # 安定動作時の実バージョンに固定
  image_picker: 1.0.4          # 厳密固定
  package_info_plus: 4.2.0     # 厳密固定
  http: 1.2.2                  # 依存関係(web package)の競合を解消する特定バージョンに固定
  shared_preferences: 2.2.2    # 厳密固定
  permission_handler: 11.3.1   # 明示的に安定版に固定して不備を阻止
  google_mlkit_object_detection: ^0.15.1
  google_mlkit_image_labeling: ^0.14.2
  geolocator: 10.1.0
  csv: 6.0.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  google_maps_flutter: 2.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0        # コード品質チェック

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - .walking_guide.env
    - assets/routes/home_route.csv
    - assets/routes/friend_home.csv

  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
